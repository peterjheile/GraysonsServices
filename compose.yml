services:
  backend:
    build: ./backend
    container_name: graysons-backend
    stdin_open: true
    tty: true
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: graysons-frontend
    stdin_open: true
    tty: true
    volumes:
      - ./frontend:/frontend